# Kiriha ランディングページ配信 Worker。
# Worker 自身を配信元にして、DNS と証明書も Cloudflare に管理させる。
name = "kiriha-landing"
main = "worker.js"
compatibility_date = "2026-05-01"

[[routes]]
pattern = "kiriha.nephilim.jp"
custom_domain = true

[[r2_buckets]]
binding = "UPDATES"
bucket_name = "kiriha-updates"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = false

# 配信障害（R2 不調等）を事後調査できるよう Workers Logs を有効化する
[observability]
enabled = true
