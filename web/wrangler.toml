# Kiriha ランディングページ配信 Worker。
# Worker 自身を配信元にして、DNS と証明書も Cloudflare に管理させる。
name = "kiriha-landing"
main = "worker.js"
compatibility_date = "2026-05-01"

[[routes]]
pattern = "kiriha.nephilim.jp"
custom_domain = true

[[r2_buckets]]
binding = "UPDATES"
bucket_name = "kiriha-updates"

# 購入・ライセンス発行/失効・管理 API は Sekisho hub（sekisho.nephilim.jp）へ移管済み。
# 旧クライアント互換の /buy, /license/issue, /license/check は worker.js 内でハードコードした
# hub の URL へリダイレクト/プロキシするだけなので、KV バインディングや Stripe 関連 vars は不要。

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# ヒーロー画像等のバイナリ資産を Worker バンドルへ同梱する
[[rules]]
type = "Data"
globs = ["**/*.png"]
fallthrough = false

# 配信障害（R2 不調等）を事後調査できるよう Workers Logs を有効化する
[observability]
enabled = true
